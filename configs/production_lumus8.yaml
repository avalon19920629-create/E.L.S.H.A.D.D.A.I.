# El Shaddai / L.U.M.U.S.-8: one-shot, advisory-only production audit.
version: 1
price_data:
  provider: yfinance
  period: 5y
fred:
  # Keyless FredReader is the default; set provider: fredapi and FRED_API_KEY only when desired.
  provider: pandas_datareader
  retry_count: 3
  pause: 1.0
  timeout: 60
  # Colab example: /content/drive/MyDrive/el_shaddai/fred_cache
  cache_dir: null
role_adapters:
  enabled: [BNDX, TLT, TIP, GLDM, XLRE, DBC]
oracle:
  enabled: true
portfolio:
  # Replace these example target weights with the approved portfolio policy.
  target_weights:
    VT: 0.40
    BTC: 0.05
    BNDX: 0.10
    TLT: 0.10
    TIP: 0.10
    GLDM: 0.10
    XLRE: 0.075
    DBC: 0.075
